name: Release Build and Install

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      working-directory: build
      run: ctest -C Release --output-on-failure

    - name: Test Installation
      run: |
        cmake --install build --prefix inst
        cmake -S tests/test_install -B build_install -DCMAKE_PREFIX_PATH=${{ github.workspace }}/inst -DCMAKE_BUILD_TYPE=Release
        cmake --build build_install --config Release
        cd build_install && ctest -C Release --output-on-failure

    - name: Test pkg-config
      if: matrix.os != 'windows-latest'
      run: |
        export PKG_CONFIG_PATH=${{ github.workspace }}/inst/lib/pkgconfig
        pkg-config --cflags --libs progpath
        pkg-config --cflags --libs progpath | grep "\-lprogpath"
