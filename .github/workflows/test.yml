  # 6. HAIKU — exercises find_path(B_APP_IMAGE_SYMBOL), getprogname,
  # __progname, and dladdr, all currently UNVERIFIED in progpath.cpp.
  # Uses cross-platform-actions/action which boots a real Haiku VM on
  # an Ubuntu host via QEMU under the hood.
  haiku:
    name: Haiku (r1beta5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on Haiku
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: haiku
          version: 'r1beta5'
          shell: bash
          run: |
            pkgman install -y cmake
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            cd build && ctest --output-on-failure

  # 7. MIDNIGHTBSD — FreeBSD-derived, uses mport/pkg.
  midnightbsd:
    name: MidnightBSD (4.0.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on MidnightBSD
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: midnightbsd
          version: '4.0.4'
          shell: bash
          run: |
            pkg install -y cmake
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            cd build && ctest --output-on-failure

  # 8. OMNIOS — illumos/Solaris-family.
  # Exercises getexecname and /proc/self/path/a.out methods.
  omnios:
    name: OmniOS (r151056)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on OmniOS
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: omnios
          version: 'r151056'
          shell: bash
          run: |
            pkg install cmake
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            cd build && ctest --output-on-failure
