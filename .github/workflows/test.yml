name: Full Multi-Platform Test

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # show path method debug output on any test failure
  PROGPATH_DEBUG: 3

jobs:
  # 1. WINDOWS (x64)
  windows-suite:
    name: Windows (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
      # os: [windows-2019, windows-2022]
        os: [windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        working-directory: build
        run: ctest -C Release --output-on-failure

  # 2. MACOS (Intel & Apple Silicon)
  macos-suite:
    name: macOS (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # os: [macos-13, macos-14]
        os: [macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  # 3. LINUX DISTROS (Docker-based)
  linux-distros:
    name: Linux (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu:latest
            pkgs: cmake build-essential
            install: apt-get update -q && apt-get install -y cmake build-essential
          - distro: debian:stable
            pkgs: cmake build-essential
            install: apt-get update -q && apt-get install -y cmake build-essential
          - distro: fedora:latest
            pkgs: cmake gcc gcc-c++ make
            install: dnf install -y cmake gcc gcc-c++ make
          - distro: opensuse/leap
            pkgs: cmake gcc gcc-c++ make
            install: zypper install -y cmake gcc gcc-c++ make
          - distro: archlinux:latest
            pkgs: cmake base-devel
            install: pacman -Sy --noconfirm cmake base-devel
          - distro: alpine:latest
            pkgs: cmake build-base
            install: apk add --no-cache cmake build-base
    container:
      image: ${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: ${{ matrix.install }}
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Test
        working-directory: build
        run: ctest --output-on-failure

