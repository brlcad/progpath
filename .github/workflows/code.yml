name: Code Review

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 1 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  strict-build:
    if: github.event_name != 'schedule'
    name: Strict Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake (Strict)
      run: cmake -B build_strict -DCMAKE_BUILD_TYPE=Debug -DPROGPATH_STRICT=ON

    - name: Build (Strict)
      run: cmake --build build_strict --config Debug

  sanitizers:
    if: github.event_name != 'schedule'
    name: Sanitizers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake (Sanitizers)
      run: cmake -B build_san -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

    - name: Build (Sanitizers)
      run: cmake --build build_san --config Debug

    - name: Test (Sanitizers)
      working-directory: build_san
      run: ctest -C Debug --output-on-failure

  formatting:
    if: github.event_name != 'schedule'
    name: Formatting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

    - name: Check Formatting
      run: find . \( -name "*.[ch]" -o -name "*.cpp" \) -not -path "./build*" -not -path "./.git*" | xargs clang-format --dry-run --Werror

  cppcheck:
    if: github.event_name != 'schedule'
    name: Cppcheck
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run cppcheck
      run: cppcheck --project=build/compile_commands.json --enable=warning,portability --inconclusive --error-exitcode=1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: cpp

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:cpp"
